services:
  - type: web
    name: property-sales-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: RATE_LIMIT_REQUESTS
        value: "20"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
