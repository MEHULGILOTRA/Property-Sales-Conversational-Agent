<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#f8fafc" rx="12"/>
  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Property Sales Conversational Agent — Architecture</text>

  <!-- Clients -->
  <rect x="30" y="70" width="150" height="52" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="105" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#075985">Web Chat UI</text>
  <text x="105" y="110" text-anchor="middle" font-size="11" fill="#075985">GET /</text>

  <rect x="30" y="140" width="150" height="52" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="105" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#075985">CLI</text>
  <text x="105" y="180" text-anchor="middle" font-size="11" fill="#075985">main_cli.py</text>

  <rect x="30" y="210" width="150" height="52" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="105" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#075985">Any HTTP client</text>
  <text x="105" y="250" text-anchor="middle" font-size="11" fill="#075985">curl / Postman</text>

  <!-- FastAPI -->
  <rect x="240" y="70" width="180" height="192" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="330" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">FastAPI</text>
  <text x="330" y="118" text-anchor="middle" font-size="11" fill="#5b21b6">POST /agents/chat</text>
  <text x="330" y="136" text-anchor="middle" font-size="11" fill="#5b21b6">POST /conversations</text>
  <text x="330" y="154" text-anchor="middle" font-size="11" fill="#5b21b6">GET /health</text>
  <line x1="252" y1="168" x2="408" y2="168" stroke="#c4b5fd"/>
  <text x="330" y="188" text-anchor="middle" font-size="11" fill="#5b21b6">request-ID middleware</text>
  <text x="330" y="206" text-anchor="middle" font-size="11" fill="#5b21b6">per-IP rate limiter</text>
  <text x="330" y="224" text-anchor="middle" font-size="11" fill="#5b21b6">latency logging</text>

  <!-- LangGraph -->
  <rect x="480" y="60" width="390" height="330" rx="10" fill="#ecfdf5" stroke="#059669"/>
  <text x="675" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">LangGraph (MemorySaver keyed by conversation_id)</text>

  <rect x="600" y="100" width="150" height="36" rx="8" fill="#ffffff" stroke="#059669"/>
  <text x="675" y="123" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">greet → router</text>

  <!-- router branches -->
  <rect x="500" y="170" width="110" height="34" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="555" y="192" text-anchor="middle" font-size="11" fill="#334155">ask_budget</text>

  <rect x="500" y="214" width="110" height="34" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="555" y="236" text-anchor="middle" font-size="11" fill="#334155">not_relevant</text>

  <rect x="500" y="258" width="110" height="34" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="555" y="280" text-anchor="middle" font-size="11" fill="#334155">project_qa</text>

  <rect x="640" y="170" width="220" height="34" rx="8" fill="#ffffff" stroke="#0284c7"/>
  <text x="750" y="192" text-anchor="middle" font-size="11" fill="#075985">extract_budget → sql_search</text>

  <rect x="640" y="214" width="220" height="34" rx="8" fill="#ffffff" stroke="#0284c7"/>
  <text x="750" y="236" text-anchor="middle" font-size="11" fill="#075985">select_top → summarize → present</text>

  <rect x="640" y="258" width="220" height="34" rx="8" fill="#ffffff" stroke="#d97706"/>
  <text x="750" y="280" text-anchor="middle" font-size="11" fill="#92400e">book_project (email capture)</text>

  <rect x="640" y="302" width="220" height="34" rx="8" fill="#ffffff" stroke="#dc2626"/>
  <text x="750" y="324" text-anchor="middle" font-size="11" fill="#991b1b">cancel_booking</text>

  <line x1="675" y1="136" x2="555" y2="170" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="675" y1="136" x2="750" y2="170" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="750" y1="204" x2="750" y2="214" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="675" y1="136" x2="770" y2="258" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="675" y1="136" x2="790" y2="302" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Data layer -->
  <rect x="480" y="430" width="185" height="100" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="572" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">SQLite (async)</text>
  <text x="572" y="478" text-anchor="middle" font-size="11" fill="#92400e">projects · leads</text>
  <text x="572" y="496" text-anchor="middle" font-size="11" fill="#92400e">visit_bookings</text>
  <text x="572" y="514" text-anchor="middle" font-size="11" fill="#92400e">SQLSearchTool · BookingTool</text>

  <rect x="695" y="430" width="175" height="100" rx="10" fill="#fee2e2" stroke="#dc2626"/>
  <text x="782" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">LLM</text>
  <text x="782" y="478" text-anchor="middle" font-size="11" fill="#991b1b">Ollama (local) or any</text>
  <text x="782" y="496" text-anchor="middle" font-size="11" fill="#991b1b">OpenAI-compatible API</text>
  <text x="782" y="514" text-anchor="middle" font-size="11" fill="#991b1b">deterministic fallbacks</text>

  <!-- flows -->
  <line x1="180" y1="96" x2="240" y2="110" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="180" y1="166" x2="240" y2="160" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="180" y1="236" x2="240" y2="210" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="420" y1="166" x2="480" y2="166" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="620" y1="390" x2="590" y2="430" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="740" y1="390" x2="770" y2="430" stroke="#64748b" marker-end="url(#arrow)"/>
</svg>
