<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="one" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="860" height="400" fill="#f8fafc" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Data Model</text>

  <!-- projects -->
  <rect x="40" y="70" width="240" height="270" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
  <rect x="40" y="70" width="240" height="34" rx="10" fill="#e0f2fe"/>
  <text x="160" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#075985">projects (1,071 rows)</text>
  <g font-size="12" fill="#334155">
    <text x="55" y="126">🔑 id</text>
    <text x="55" y="148">project_name · developer</text>
    <text x="55" y="170">city · country</text>
    <text x="55" y="192">bedrooms · bathrooms · area_sqm</text>
    <text x="55" y="214">price_usd</text>
    <text x="55" y="236">property_type · unit_type</text>
    <text x="55" y="258">completion_status · completion_date</text>
    <text x="55" y="280">features · facilities</text>
    <text x="55" y="302">description</text>
  </g>

  <!-- leads -->
  <rect x="580" y="70" width="240" height="160" rx="10" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <rect x="580" y="70" width="240" height="34" rx="10" fill="#ecfdf5"/>
  <text x="700" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">leads</text>
  <g font-size="12" fill="#334155">
    <text x="595" y="126">🔑 id</text>
    <text x="595" y="148">first_name · last_name</text>
    <text x="595" y="170">email  (unique per customer)</text>
    <text x="595" y="192">preferences (JSON: city, budget)</text>
    <text x="595" y="214">created_at</text>
  </g>

  <!-- visit_bookings -->
  <rect x="320" y="240" width="240" height="140" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
  <rect x="320" y="240" width="240" height="34" rx="10" fill="#fef3c7"/>
  <text x="440" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">visit_bookings</text>
  <g font-size="12" fill="#334155">
    <text x="335" y="296">🔑 id</text>
    <text x="335" y="318">🔗 lead_id → leads.id</text>
    <text x="335" y="340">🔗 project_id → projects.id</text>
    <text x="335" y="362">city · created_at</text>
  </g>

  <!-- relations -->
  <path d="M 280 300 C 300 300, 305 314, 318 314" fill="none" stroke="#64748b" stroke-width="1.5" marker-start="url(#one)"/>
  <text x="288" y="292" font-size="11" fill="#64748b">1 : N</text>
  <path d="M 700 232 C 700 300, 575 336, 562 336" fill="none" stroke="#64748b" stroke-width="1.5" marker-start="url(#one)"/>
  <text x="660" y="290" font-size="11" fill="#64748b">1 : N</text>

  <text x="430" y="388" text-anchor="middle" font-size="11" fill="#64748b">SQLite via async SQLAlchemy — leads are deduplicated by email; one lead can book visits to many projects</text>
</svg>
